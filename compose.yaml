include:
  - path: ./infra.yaml

services:

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgres://admin:admin123@postgres:5432/auth_db?sslmode=disable
      PORT: "8001"
      MASTER_KEY: admin-secreto-123
    depends_on:
      - postgres

  flag-service:
    build: ./flag-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgres://admin:admin123@postgres:5432/auth_db?sslmode=disable
      PORT: "8002"
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      - postgres
      - auth-service

  targeting-service:
    build: ./targeting-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgres://admin:admin123@postgres:5432/auth_db?sslmode=disable
      PORT: "8003"
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      - postgres
      - auth-service

  evaluation-service:
    build: ./evaluation-service
    ports:
      - "8004:8004"
    environment:
      PORT: "8004"
      REDIS_URL: redis://redis:6379
      FLAG_SERVICE_URL: http://flag-service:8002
      TARGETING_SERVICE_URL: http://targeting-service:8003
      SERVICE_API_KEY: tm_key_ac7fb76fc836c379117e68d35af0eee5a63f5f87805b537fa5416972bb6bd731
    depends_on:
      - redis
      - flag-service
      - targeting-service

  analytics-service:
    build: ./analytics-service
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      AWS_REGION: us-east-1
      AWS_SQS_URL: http://localstack:4566/000000000000/toggle-master-queue
      AWS_DYNAMODB_TABLE: ToggleMasterAnalytics
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      - localstack
