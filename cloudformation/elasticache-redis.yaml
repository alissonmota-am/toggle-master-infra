AWSTemplateFormatVersion: '2010-09-09'
Description: ElastiCache Redis para ToggleMaster (evaluation-service)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID da VPC existente
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets privadas para o ElastiCache
  CacheNodeType:
    Type: String
    Default: cache.t3.micro
    AllowedValues:
      - cache.t3.micro
      - cache.t3.small
      - cache.t3.medium

Resources:
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnets para ElastiCache Redis
      SubnetIds: !Ref SubnetIds

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acesso ao Redis somente pelo EKS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !ImportValue toggle-master-node-sg
          Description: Acesso dos nodes EKS ao Redis
      Tags:
        - Key: Name
          Value: toggle-master-redis-sg

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: toggle-master-redis
      Engine: redis
      EngineVersion: '7.0'
      CacheNodeType: !Ref CacheNodeType
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      VpcSecurityGroupIds:
        - !Ref RedisSecurityGroup

Outputs:
  RedisEndpoint:
    Value: !GetAtt RedisCluster.RedisEndpoint.Address
    Description: Endpoint do Redis para usar em REDIS_URL
    Export:
      Name: toggle-master-redis-endpoint
  RedisPort:
    Value: !GetAtt RedisCluster.RedisEndpoint.Port
